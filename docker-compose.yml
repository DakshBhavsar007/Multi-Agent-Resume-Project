services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: vishleshan
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports: ["8000:8000"]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    env_file: ./backend/.env
    environment:
      # Override host .env so containers talk to compose services, not localhost
      DATABASE_URL: postgresql+asyncpg://postgres:password@postgres:5432/vishleshan
      REDIS_URL: redis://redis:6379
      UPLOAD_DIR: /tmp/vishleshan/resumes
      PHOTO_DIR: /tmp/vishleshan/photos
    volumes:
      - ./backend:/app
      - resume_uploads:/tmp/vishleshan
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 10s
      timeout: 8s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  celery_worker:
    build: ./backend
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@postgres:5432/vishleshan
      REDIS_URL: redis://redis:6379
      UPLOAD_DIR: /tmp/vishleshan/resumes
      PHOTO_DIR: /tmp/vishleshan/photos
    volumes:
      - ./backend:/app
      - resume_uploads:/tmp/vishleshan
    command:
      [
        "celery",
        "-A",
        "workers.celery_worker",
        "worker",
        "--loglevel=info",
        "--concurrency=4",
      ]
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    depends_on:
      backend: {condition: service_healthy}
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    volumes: [./frontend:/app, /app/node_modules]
    command: npm run dev
    restart: unless-stopped

  portal:
    build: ./portal
    ports: ["3001:3001"]
    depends_on:
      backend: {condition: service_healthy}
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_RAZORPAY_KEY: rzp_test_placeholder
    volumes: [./portal:/app, /app/node_modules]
    command: npm run dev
    restart: unless-stopped

volumes:
  postgres_data:
  resume_uploads:
