version: '3.8'

services:
  # 1. Local PostgreSQL (used as a fallback; will connect to Neon if DATABASE_URL is set in backend/.env)
  db:
    image: postgres:15-alpine
    container_name: vish_db
    restart: always
    environment:
      POSTGRES_DB: vishleshan
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # 2. Redis Cache & Celery Broker
  redis:
    image: redis:7-alpine
    container_name: vish_redis
    restart: always
    ports:
      - "6379:6379"

  # 3. Django Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vish_backend
    restart: always
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/vishleshan
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis

  # 4. Celery Worker (running the background task queue in native Linux prefork mode)
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vish_celery
    restart: always
    command: celery -A workers.celery_worker worker --loglevel=info --concurrency=4
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/vishleshan
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - db

  # 5. React Vite Frontend (hot-reloading enabled)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vish_frontend
    restart: always
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
